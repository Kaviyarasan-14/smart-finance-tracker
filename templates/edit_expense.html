<!DOCTYPE html>
<html>

<head>

    <title>Edit Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="navbar">

    <h2>Smart Finance Tracker</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/history">History</a>
    </div>

</div>

<div class="form-container">

    <h1>Edit Expense</h1>

    <form method="POST">

        <input type="text" name="title" value="{{ expense[1] }}">

        <input type="text" name="category" value="{{ expense[2] }}">

        <input type="number" name="amount" value="{{ expense[3] }}">

        <input type="date" name="expense_date" value="{{ expense[4] }}">

        <button type="submit">Update Expense</button>

    </form>

</div>

</body>
</html>
